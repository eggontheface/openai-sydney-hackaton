<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BioStream — mobile prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: #f0efea; font-family: 'Inter', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  #root { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  @media (max-width: 480px) {
    #root { padding: 0; align-items: stretch; }
    #root > div { width: 100% !important; height: 100vh !important; border-radius: 0 !important; border: 0 !important; box-shadow: none !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tokens.jsx"></script>
<script src="coach-engine.js"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="chat-primitives.jsx"></script>
<script type="text/babel" src="screens-onboarding-chat.jsx"></script>
<script type="text/babel" src="screens-main.jsx"></script>
<script type="text/babel" src="screens-coach.jsx"></script>
<script type="text/babel" src="screens-coach-home.jsx"></script>

<script type="text/babel" data-presets="env,react">
const tokens = window.DIRECTIONS.B;

function PrototypeApp({ persona = 'steady', goal = 'run' }) {
  const personaData = window.PERSONAS[persona];
  const [tab, setTab] = React.useState('coach');
  const [onboarded, setOnboarded] = React.useState(true);
  const [activeGoal, setActiveGoal] = React.useState(goal);

  if (!onboarded) {
    return (
      <PhoneShell tokens={tokens} bg={tokens.bg}>
        <MinimizedOnboarding tokens={tokens} onComplete={(nextGoal) => { setActiveGoal(nextGoal || 'run'); setOnboarded(true); }}/>
      </PhoneShell>
    );
  }

  return (
    <PhoneShell tokens={tokens} bg={tokens.bg}>
      {tab === 'coach' && (
        <CoachHome tokens={tokens} persona={personaData} goal={activeGoal} onTab={setTab} active="coach" onOpenWorkout={() => setTab('workout')}/>
      )}
      {tab === 'workout' && <WorkoutScreen tokens={tokens} persona={personaData} goal={activeGoal} active="workout" onTab={setTab}/>}
      {tab === 'history' && <HistoryScreen tokens={tokens} persona={personaData} active="history" onTab={setTab}/>}
      {tab === 'profile' && <ProfileScreen tokens={tokens} persona={personaData} goal={activeGoal} active="profile" onTab={setTab}/>}
    </PhoneShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrototypeApp/>);
</script>
</body>
</html>
